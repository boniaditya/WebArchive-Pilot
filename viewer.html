<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebArchive Pilot – Viewer</title>
  <link rel="icon" href="icons/icon128.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #f5f5f7;
      overflow: hidden;
    }

    /* ── Layout shell ── */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar (shown when a file is loaded) ── */
    #topBar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 48px;
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #d1d1d6;
      z-index: 10;
    }
    #topBar .icon { font-size: 18px; flex-shrink: 0; }
    #topBar .info { flex: 1; min-width: 0; }
    #topBar .filename {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #topBar .meta { font-size: 11px; color: #6e6e73; }
    #topBar .url-row {
      display: flex; align-items: center; gap: 6px; margin-top: 1px;
    }
    #topBar .url-row a {
      font-size: 11px; color: #0071e3; text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 500px;
    }
    #topBar .url-row a:hover { text-decoration: underline; }
    #topBar .badge {
      flex-shrink: 0;
      font-size: 10px; padding: 2px 6px;
      background: #f0f0f5; border-radius: 20px; color: #6e6e73;
    }
    #closeBtn {
      flex-shrink: 0;
      padding: 5px 12px;
      border: 1px solid #d1d1d6;
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #1d1d1f;
      transition: background 0.1s;
    }
    #closeBtn:hover { background: #f5f5f7; }

    /* ── Drop zone (initial state) ── */
    #dropZone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      cursor: pointer;
      border: 2.5px dashed #c7c7cc;
      border-radius: 16px;
      margin: 32px;
      transition: border-color 0.15s, background 0.15s;
    }
    #dropZone:hover, #dropZone.drag-over {
      border-color: #0071e3;
      background: #f0f6ff;
    }
    #dropZone .dz-icon { font-size: 52px; line-height: 1; }
    #dropZone h2 {
      font-size: 18px; font-weight: 600;
      color: #1d1d1f; text-align: center;
    }
    #dropZone p {
      font-size: 13px; color: #6e6e73; text-align: center;
    }
    #dropZone .browse-link {
      font-size: 13px; color: #0071e3;
      text-decoration: underline; cursor: pointer;
    }
    #dropError {
      font-size: 12px; color: #c0392b;
      background: #fff0f0; border: 1px solid #ffd7d7;
      border-radius: 8px; padding: 6px 14px;
    }
    #dropError:empty { display: none; }

    /* ── Loading overlay ── */
    #loadingOverlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e5e5ea;
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingMsg { font-size: 13px; color: #6e6e73; }
    #loadingSteps {
      display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
    }
    .step {
      font-size: 12px; color: #aeaeb2;
      display: flex; align-items: center; gap: 6px;
    }
    .step.done   { color: #30d158; }
    .step.active { color: #0071e3; font-weight: 500; }
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }

    /* ── Viewer iframe ── */
    #viewerFrame {
      display: none;
      flex: 1;
      border: none;
      width: 100%;
    }

    /* ── Input (hidden) ── */
    #fileInput { display: none; }
  </style>
</head>
<body>

<div id="shell">

  <!-- Top bar (visible after file is loaded) -->
  <div id="topBar">
    <div class="icon">📄</div>
    <div class="info">
      <div class="filename" id="barFilename"></div>
      <div class="url-row">
        <a id="barUrl" href="#" target="_blank" rel="noopener"></a>
        <span class="badge" id="barMeta"></span>
      </div>
    </div>
    <button id="closeBtn">✕ Close</button>
  </div>

  <!-- Drop zone -->
  <div id="dropZone">
    <div class="dz-icon">🗂</div>
    <h2>WebArchive Pilot – Viewer</h2>
    <p>Drag &amp; drop a file here, or <span class="browse-link" id="browseLink">browse…</span></p>
    <p style="font-size:11px;color:#aeaeb2;">.webarchive files saved by Safari or this extension</p>
    <div id="dropError"></div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingSteps">
      <div class="step" id="step-read">   <div class="step-dot"></div> Reading file</div>
      <div class="step" id="step-decode"> <div class="step-dot"></div> Decoding binary plist</div>
      <div class="step" id="step-urls">   <div class="step-dot"></div> Mapping resources</div>
      <div class="step" id="step-patch">  <div class="step-dot"></div> Patching HTML &amp; CSS</div>
      <div class="step" id="step-render"> <div class="step-dot"></div> Rendering</div>
    </div>
  </div>

  <!-- Rendered page -->
  <iframe id="viewerFrame"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"
          title="Web archive viewer"></iframe>

</div>

<input type="file" id="fileInput" accept=".webarchive" />

<script type="module" src="viewer.js"></script>
</body>
</html>
